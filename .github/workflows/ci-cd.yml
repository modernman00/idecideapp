name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: xdebug
          extensions: mbstring, pdo_sqlite, bcmath, curl

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

  test:
    needs: setup
    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: xdebug
      - run: composer install --no-progress --prefer-dist
      - run: vendor/bin/phpunit --coverage-clover=coverage.xml || vendor/bin/pest --coverage --coverage-clover=coverage.xml
      - uses: codecov/codecov-action@v4
        if: matrix.php-version == '8.2'
        with:
          file: coverage.xml
          fail_ci_if_error: false

  quality:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - run: vendor/bin/php-cs-fixer fix --dry-run --diff || echo "No CS Fixer found"
      - run: vendor/bin/phpstan analyse || echo "PHPStan issues detected"
      - run: vendor/bin/psalm || echo "Psalm not configured"

  security:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - run: composer audit
      - run: composer require --dev roave/security-advisories --dry-run

  release:
    if: github.event_name == 'release'
    needs: [test, quality, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: composer install --no-dev --optimize-autoloader
      - run: tar -czf release.tar.gz . --exclude=.git*
      - run: sha256sum release.tar.gz > checksums.txt
      - uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: release.tar.gz
          asset_name: release.tar.gz
          asset_content_type: application/gzip
      - uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: checksums.txt
          asset_name: checksums.txt
          asset_content_type: text/plain
